name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      # -----------------------------------------------------------------------
      # Checkout
      # -----------------------------------------------------------------------

      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout waaseyaa framework
        uses: actions/checkout@v4
        with:
          repository: waaseyaa/framework
          ref: main
          path: waaseyaa

      # -----------------------------------------------------------------------
      # PHP setup
      # -----------------------------------------------------------------------

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, sqlite3, mbstring, xml
          coverage: none

      # -----------------------------------------------------------------------
      # Run tests (install all deps including dev first)
      # -----------------------------------------------------------------------

      - name: Install all Composer dependencies (with dev)
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPUnit tests
        run: ./vendor/bin/phpunit

      # -----------------------------------------------------------------------
      # Install production-only dependencies for the artifact
      # -----------------------------------------------------------------------

      - name: Strip dev dependencies
        run: |
          composer install \
            --no-dev \
            --no-interaction \
            --optimize-autoloader \
            --prefer-dist

      # -----------------------------------------------------------------------
      # Admin SPA (Nuxt, from waaseyaa/packages/admin)
      # -----------------------------------------------------------------------

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'

      - name: Build admin SPA
        run: |
          cd waaseyaa/packages/admin
          npm install --no-audit --no-fund
          export NUXT_PUBLIC_APP_NAME=NorthOps
          export NUXT_PUBLIC_BASE_URL=
          npm run generate
          rm -rf "${GITHUB_WORKSPACE}/public/admin"
          mkdir -p "${GITHUB_WORKSPACE}/public/admin"
          cp -a .output/public/* "${GITHUB_WORKSPACE}/public/admin/"

      # -----------------------------------------------------------------------
      # Assemble build artifact
      # -----------------------------------------------------------------------

      - name: Assemble build artifact
        run: |
          mkdir -p .build
          rsync -aL \
            --exclude='.git' \
            --exclude='.build/' \
            --exclude='tests/' \
            --exclude='docs/' \
            --exclude='worktrees/' \
            --exclude='*.sqlite' \
            --exclude='.env' \
            --exclude='storage/framework/packages.php' \
            --exclude='phpunit.xml' \
            --exclude='deploy.php' \
            ./ .build/

      # -----------------------------------------------------------------------
      # Deploy via PHP Deployer
      # -----------------------------------------------------------------------

      - name: Install PHP Deployer
        run: composer global require deployer/deployer --no-interaction

      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add known host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan northops.ca >> ~/.ssh/known_hosts

      - name: Deploy
        run: dep deploy production --no-interaction
